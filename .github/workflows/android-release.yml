name: Android APK

on:
  workflow_dispatch:
    inputs:
      ats_server_url:
        description: "Default ATS server URL baked into the APK"
        required: false
        default: "http://10.0.2.2:8501"
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build debug APK
        working-directory: android
        run: >
          gradle assembleDebug
          -PatsServerUrl="${{ inputs.ats_server_url || 'http://10.0.2.2:8501' }}"

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk Offline-ATS.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Offline-ATS-apk
          path: Offline-ATS.apk

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Offline-ATS.apk
