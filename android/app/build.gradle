plugins {
    id "com.android.application"
}

android {
    namespace "org.offlineats.mobile"
    compileSdk 35

    buildFeatures {
        buildConfig true
    }

    defaultConfig {
        applicationId "org.offlineats.mobile"
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName "1.0.0"

        def configuredUrl = project.findProperty("atsServerUrl") ?: "http://10.0.2.2:8501"
        buildConfigField "String", "ATS_SERVER_URL", "\"${configuredUrl}\""
    }
}
